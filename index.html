<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Tesoura — Controle do Futebol</title>
  <style>
    :root{ --bg:#071b2a; --line:#ff7a1a; --btn:#0f2b40; --btn2:#13354f; --txt:#e9f2ff; }
    html,body{ height:100%; margin:0; background:var(--bg); color:var(--txt); font-family:system-ui,Segoe UI,Arial; }
    .top{ display:flex; align-items:center; gap:12px; padding:12px 14px; border-bottom:2px solid var(--line); }
    .brand{ font-weight:800; letter-spacing:.3px; }
    .tabs{ display:flex; gap:10px; flex-wrap:wrap; padding:10px 14px; border-bottom:1px solid rgba(255,255,255,.08); }
    .tab{
      background:var(--btn); color:var(--txt); border:1px solid rgba(255,255,255,.12);
      padding:10px 14px; border-radius:10px; cursor:pointer; font-weight:700;
    }
    .tab:hover{ background:var(--btn2); }
    .tab.active{ outline:2px solid var(--line); }
    .wrap{ height:calc(100vh - 112px); }
    iframe{ width:100%; height:100%; border:0; background:var(--bg); }
    .hint{ padding:8px 14px; font-size:12px; opacity:.85; }
  </style>
</head>
<body>
  <div class="top">
    <div class="brand">Tesoura — Controle do Futebol</div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="hint">Página Única (abas). Se um painel abrir com “cabeçalho duplicado”, ele será ocultado automaticamente.</div>

  <div class="wrap">
    <iframe id="frame" src="about:blank" referrerpolicy="no-referrer"></iframe>
  </div>

<script>
(function(){
  const PANELS = [
    {key:"jogadores",  label:"JOGADORES",            file:"tesoura_jogadores_teste.html"},
    {key:"presenca",   label:"PRESENÇA / ESCALAÇÃO", file:"tesoura_presenca_escala_R5.html"},
    {key:"controle",   label:"CONTROLE GERAL",       file:"tesoura_controle_geral_teste.html"},
    {key:"mensal",     label:"MENSALIDADE",          file:"tesoura_mensalidade_R4.html"},
    {key:"caixa",      label:"CAIXA",                file:"tesoura_caixa_teste.html"},
    {key:"gols",       label:"GOLS",                 file:"tesoura_gols_teste.html"},
  ];

  const tabs = document.getElementById("tabs");
  const frame = document.getElementById("frame");

  function setActive(key){
    [...tabs.querySelectorAll(".tab")].forEach(b => b.classList.toggle("active", b.dataset.key===key));
  }

  function load(key){
    const p = PANELS.find(x=>x.key===key) || PANELS[0];
    setActive(p.key);
    location.hash = p.key;
    frame.src = p.file + "?v=" + Date.now();
  }

  // Oculta cabeçalho/menu duplicado dentro do iframe (mesmo domínio => permitido)
  function hideDuplicatedHeader(doc){
    try{
      const texts = ["LOGIN","SAIR","JOGADOR (VISUAL)","TESOURA","JOGADORES","PRESENÇA","ESCALAÇÃO","CONTROLE GERAL","MENSALIDADE","CAIXA","GOLS","BANCO DE DADOS"];
      const candidates = [];
      doc.querySelectorAll("button,a,div,span").forEach(el=>{
        const t = (el.innerText||"").trim().toUpperCase();
        if(!t) return;
        if(texts.some(x=>t===x || t.includes(x))){
          candidates.push(el);
        }
      });
      // sobe até achar um “bloco” grande no topo e esconde
      function topContainer(el){
        let cur = el;
        for(let i=0;i<8 && cur && cur !== doc.body;i++){
          const r = cur.getBoundingClientRect ? cur.getBoundingClientRect() : null;
          if(r && r.top <= 5 && r.height >= 50) return cur;
          cur = cur.parentElement;
        }
        return null;
      }
      const tops = candidates.map(topContainer).filter(Boolean);

      // esconde até 2 containers do topo (pra matar “duas páginas”)
      let hidden = 0;
      for(const c of tops){
        if(hidden>=2) break;
        // evita esconder o corpo inteiro
        if(c === doc.body) continue;
        c.style.display = "none";
        hidden++;
      }

      // garante que o conteúdo encoste no topo
      doc.documentElement.style.scrollBehavior = "auto";
      doc.body.style.marginTop = "0px";
    }catch(e){}
  }

  frame.addEventListener("load", ()=>{
    try{
      const doc = frame.contentDocument;
      if(!doc) return;
      hideDuplicatedHeader(doc);
    }catch(e){}
  });

  // cria botões
  PANELS.forEach(p=>{
    const b = document.createElement("button");
    b.className="tab";
    b.textContent=p.label;
    b.dataset.key=p.key;
    b.onclick=()=>load(p.key);
    tabs.appendChild(b);
  });

  // abre pelo hash
  const k = (location.hash||"").replace("#","").trim();
  load(k || PANELS[0].key);
})();
</script>
</body>
</html>
