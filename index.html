<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Tesoura — Controle do Futebol</title>
  <style>
    :root{
      --bg:#061829;
      --bg2:#0a2236;
      --line:#ff8a2a;
      --btn:#0f2d46;
      --btnOn:#163a58;
      --txt:#e9f2ff;
      --muted:#9fb3c8;
    }
    html,body{height:100%; margin:0; background:var(--bg); color:var(--txt); font-family:system-ui,Segoe UI,Arial;}
    .topbar{padding:14px 16px; border-bottom:2px solid var(--line); background:linear-gradient(180deg,var(--bg2),var(--bg));}
    .title{font-weight:700; font-size:18px;}
    .nav{display:flex; gap:10px; padding:10px 12px; border-bottom:1px solid rgba(255,138,42,.35); flex-wrap:wrap;}
    .btn{
      background:var(--btn);
      color:var(--txt);
      border:1px solid rgba(255,255,255,.10);
      padding:8px 12px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
    }
    .btn.on{outline:2px solid var(--line); background:var(--btnOn);}
    .hint{padding:6px 12px; color:var(--muted); font-size:12px;}
    .wrap{padding:0; margin:0;}
    #frame{
      width:100%;
      height:calc(100vh - 130px);
      border:0;
      display:block;
      visibility:visible;
      opacity:1;
      pointer-events:auto;
      background:transparent;
    }
    .err{
      display:none;
      margin:10px 12px;
      padding:10px 12px;
      border:1px solid rgba(255,138,42,.6);
      border-radius:10px;
      background:rgba(255,138,42,.08);
      color:var(--txt);
      font-size:13px;
    }
    .err a{color:var(--txt); font-weight:800;}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Tesoura — Controle do Futebol</div>
  </div>

  <div class="nav" id="nav">
    <button class="btn" data-panel="jogadores">JOGADORES</button>
    <button class="btn" data-panel="presenca">PRESENÇA / ESCALAÇÃO</button>
    <button class="btn" data-panel="controle">CONTROLE GERAL</button>
    <button class="btn" data-panel="mensalidade">MENSALIDADE</button>
    <button class="btn" data-panel="caixa">CAIXA</button>
    <button class="btn" data-panel="gols">GOLS</button>
  </div>

  <div class="hint">Página Única (abas). Se algum painel abrir “vazio”, é arquivo inexistente (404) ou erro dentro do painel.</div>
  <div class="err" id="err"></div>

  <div class="wrap">
    <iframe id="frame" src="about:blank"></iframe>
  </div>

<script>
(function(){
  // MAPEAMENTO (somente arquivos que existem na RAIZ do repo)
  const PANELS = {
    jogadores:   { file: "tesoura_jogadores_teste.html" },
    presenca:    { file: "tesoura_presenca_escala_R5.html" },
    controle:    { file: "tesoura_controle_geral_teste.html" },
    mensalidade: { file: "tesoura_mensalidade_R4.html" },
    caixa:       { file: "tesoura_caixa_teste.html" },
    gols:        { file: "tesoura_gols_teste.html" }
  };

  const nav = document.getElementById("nav");
  const frame = document.getElementById("frame");
  const err = document.getElementById("err");

  function setErr(html){
    err.innerHTML = html;
    err.style.display = "block";
  }
  function clearErr(){
    err.style.display = "none";
    err.innerHTML = "";
  }

  function select(panel, pushHash=true){
    if(!PANELS[panel]) panel = "jogadores";

    [...nav.querySelectorAll(".btn")].forEach(b=>{
      b.classList.toggle("on", b.dataset.panel===panel);
    });

    clearErr();

    // força reload leve (evita cache “grudado”)
    const v = Date.now();
    const src = `${PANELS[panel].file}?v=${v}#in_app`;
    frame.src = src;

    // se não carregar, mostra aviso com link direto
    const thisSrc = src;
    setTimeout(()=>{
      // se ainda estiver no mesmo src depois do tempo, provavelmente travou/404/erro interno
      if(frame.src.includes(thisSrc)){
        setErr(`Painel <b>${panel}</b> pode não ter carregado. <a href="${PANELS[panel].file}?v=${v}" target="_blank">Abrir este painel direto</a>`);
      }
    }, 1800);

    if(pushHash) location.hash = panel;
  }

  nav.addEventListener("click", (e)=>{
    const btn = e.target.closest(".btn");
    if(!btn) return;
    select(btn.dataset.panel, true);
  });

  window.addEventListener("hashchange", ()=>{
    const p = (location.hash||"").replace("#","").trim();
    select(p || "jogadores", false);
  });

  frame.addEventListener("load", ()=>{ clearErr(); });

  // inicial
  const start = (location.hash||"").replace("#","").trim() || "jogadores";
  select(start, false);
})();
</script>
</body>
</html>
