<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>

  <title>TESOURA - CAIXA</title>

  <script>
    // CAIXA REV 20260110_2200: garante stubs globais (evita erro buildSemanas)
    window.buildSemanas = window.buildSemanas || function(){ return; };
    window.updateUIByPeriodo = window.updateUIByPeriodo || function(){ return; };
  </script>

  <link rel="stylesheet" href="app/css/ui.css?v=20260110_2200"/>

  <style>
    :root{
      --bg0:#060b16;
      --bg1:#0a1226;
      --card:#0b1530;
      --stroke:#1a2a55;
      --txt:#eaf0ff;
      --muted:#a8b6dd;
      --orange:#ff8b2a;
      --green:#2ee59d;
      --red:#ff4d6d;
      --blue:#39b5ff;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --radius: 18px;
    }
    html,body{height:100%; background:linear-gradient(180deg,var(--bg0),var(--bg1)); color:var(--txt); margin:0;}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; overflow-x:hidden;}
    .wrap{max-width:1180px; margin:0 auto; padding:22px 18px 90px;}
    .title{font-weight:900; letter-spacing:.5px; color:var(--orange); font-size:28px; margin:8px 0 18px;}
    .card{
      background: radial-gradient(1200px 600px at 15% -20%, rgba(255,139,42,.20), rgba(0,0,0,0)) , var(--card);
      border:1px solid var(--stroke);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding:16px;
    }
    .row{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;}
    .field{display:flex; flex-direction:column; gap:6px;}
    .field label{font-size:12px; color:var(--muted); font-weight:700; letter-spacing:.2px;}
    select,input{
      height:40px;
      border-radius:12px;
      border:1px solid var(--stroke);
      background:#06102a;
      color:var(--txt);
      padding:0 12px;
      outline:none;
      min-width:160px;
    }
    input[type="date"]{min-width:170px;}
    .btn{
      height:40px; padding:0 14px;
      border-radius:12px;
      border:0;
      font-weight:900;
      cursor:pointer;
      color:#07111f;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .btn.green{background:var(--green);}
    .btn.orange{background:var(--orange);}
    .btn.blue{background:var(--blue);}
    .btn.gray{background:#7f8fb6; color:#07111f;}
    .btn:active{transform:translateY(1px);}
    .status{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
    }

    table{width:100%; border-collapse:collapse; margin-top:14px; overflow:hidden; border-radius:14px;}
    thead th{
      background: rgba(255,139,42,.12);
      color:var(--orange);
      text-align:left;
      font-size:12px;
      letter-spacing:.3px;
      padding:10px 10px;
      border-bottom:1px solid var(--stroke);
      white-space:nowrap;
    }
    tbody td{
      padding:10px 10px;
      border-bottom:1px solid rgba(26,42,85,.6);
      font-size:13px;
      color:var(--txt);
      vertical-align:middle;
      white-space:nowrap;
    }
    tbody tr:hover{background: rgba(57,181,255,.06);}
    .num{font-variant-numeric: tabular-nums;}
    .pos{color:var(--green); font-weight:900;}
    .neg{color:var(--red); font-weight:900;}
    .muted{color:var(--muted);}
    .actions{display:flex; gap:8px; align-items:center;}
    .mini{
      height:30px; padding:0 10px;
      border-radius:10px;
      font-weight:900;
      border:0; cursor:pointer;
      color:#07111f;
    }
    .mini.edit{background: var(--blue);}
    .mini.del{background: var(--red); color:#fff;}

    /* Selo de versão (pra você ter certeza que o site atualizou) */
    #caixa_rev_badge{
      position: fixed; right: 12px; bottom: 12px;
      background: rgba(0,0,0,.72); color: #fff;
      font: 12px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      padding: 6px 10px; border-radius: 10px;
      z-index: 99999;
      pointer-events: none;
    }
  </style>

  <!-- Config do app -->
  <script src="app/core/config.js?v=20260110_2200"></script>

  <!-- Supabase (já usado no seu projeto) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="wrap">
    <div class="title">TESOURA - CAIXA</div>

    <div class="card">
      <div class="row">
        <div class="field">
          <label>ANO</label>
          <select id="selAno"></select>
        </div>

        <div class="field">
          <label>MÊS</label>
          <select id="selMes">
            <option value="01">01</option><option value="02">02</option><option value="03">03</option>
            <option value="04">04</option><option value="05">05</option><option value="06">06</option>
            <option value="07">07</option><option value="08">08</option><option value="09">09</option>
            <option value="10">10</option><option value="11">11</option><option value="12">12</option>
          </select>
        </div>

        <button class="btn green" id="btnConsultar">CONSULTAR</button>
        <button class="btn orange" id="btnBaixarPDF">BAIXAR PDF</button>
        <button class="btn gray" id="btnLimpar">LIMPAR</button>
      </div>

      <div class="status" id="status">Pronto.</div>

      <table>
        <thead>
          <tr>
            <th style="width:110px;">DATA</th>
            <th>DESCRIÇÃO</th>
            <th>OBS</th>
            <th style="width:130px;">RECEITA (R$)</th>
            <th style="width:130px;">DESPESA (R$)</th>
            <th style="width:130px;">SALDO (R$)</th>
            <th style="width:160px;">AÇÕES</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="caixa_rev_badge">CAIXA • REV 20260110_2200</div>

  <script>
    // ==============================
    // FIX DEFINITIVO (sem buildSemanas)
    // ==============================

    function buildSemanas(){ return; }          // stub permanente
    function updateUIByPeriodo(){ return; }     // stub permanente

    const statusEl = document.getElementById("status");
    const tbody = document.getElementById("tbody");
    const selAno = document.getElementById("selAno");
    const selMes = document.getElementById("selMes");
    const btnConsultar = document.getElementById("btnConsultar");
    const btnBaixarPDF = document.getElementById("btnBaixarPDF");
    const btnLimpar = document.getElementById("btnLimpar");

    function setStatus(msg){ statusEl.textContent = msg; }

    // Proteção: se algo quebrar, mostra no status (pra não “travar” sem explicação)
    window.addEventListener("error", (e)=>{
      setStatus("ERRO: " + (e?.message || "erro desconhecido"));
    });

    function pad2(n){ return String(n).padStart(2,"0"); }
    function money(n){
      const v = Number(n||0);
      return v.toLocaleString("pt-BR",{minimumFractionDigits:2, maximumFractionDigits:2});
    }

    function buildAnoMes(){
      const now = new Date();
      const y = now.getFullYear();
      selAno.innerHTML = "";
      for(let i=y-2;i<=y+1;i++){
        const opt=document.createElement("option");
        opt.value=String(i); opt.textContent=String(i);
        selAno.appendChild(opt);
      }
      selAno.value = String(y);
      selMes.value = pad2(now.getMonth()+1);
    }

    // Supabase client (usa seu config padrão do projeto)
    function getSb(){
      const cfg = window.TESOURA_CONFIG || {};
      const url = cfg.SUPABASE_URL || cfg.supabaseUrl || cfg.url;
      const key = cfg.SUPABASE_ANON_KEY || cfg.supabaseAnonKey || cfg.key;

      if(!url || !key){
        throw new Error("Config do Supabase não carregou (TESOURA_CONFIG).");
      }
      return window.supabase.createClient(url, key);
    }

    // ATENÇÃO:
    // - Eu mantive os nomes “Caixa” genéricos.
    // - Se a sua tabela tiver outro nome, ajuste SOMENTE AQUI:
    const TABELA_CAIXA = "caixa"; // <- se seu projeto usa outro nome, troque aqui

    async function fetchCaixa(ano, mes){
      const sb = getSb();

      // Intervalo do mês
      const start = `${ano}-${mes}-01`;
      const endDate = new Date(Number(ano), Number(mes)-1 + 1, 1); // 1º dia do próximo mês
      const end = `${endDate.getFullYear()}-${pad2(endDate.getMonth()+1)}-01`;

      // Campos esperados (padrão do seu projeto)
      const { data, error } = await sb
        .from(TABELA_CAIXA)
        .select("*")
        .gte("data", start)
        .lt("data", end)
        .order("data", { ascending: true })
        .order("created_at", { ascending: true });

      if(error) throw error;
      return data || [];
    }

    function calcSaldoRows(rows){
      let saldo = 0;
      return rows.map(r=>{
        const receita = Number(r.receita || r.valor_receita || 0);
        const despesa = Number(r.despesa || r.valor_despesa || 0);
        saldo += (receita - despesa);
        return { ...r, __saldo: saldo };
      });
    }

    function render(rows){
      tbody.innerHTML = "";
      if(!rows.length){
        const tr=document.createElement("tr");
        tr.innerHTML = `<td colspan="7" class="muted">Nenhum lançamento encontrado para este filtro.</td>`;
        tbody.appendChild(tr);
        return;
      }

      rows.forEach(r=>{
        const receita = Number(r.receita || r.valor_receita || 0);
        const despesa = Number(r.despesa || r.valor_despesa || 0);
        const saldo = Number(r.__saldo || 0);

        const tr=document.createElement("tr");

        const dt = (r.data || "").slice(0,10) || "";
        const desc = r.descricao || r.descrição || "";
        const obs = r.obs || r.observacao || r.observação || "";

        const receitaTxt = receita ? `<span class="pos num">${money(receita)}</span>` : `<span class="muted num">0,00</span>`;
        const despesaTxt = despesa ? `<span class="neg num">${money(despesa)}</span>` : `<span class="muted num">0,00</span>`;
        const saldoClass = saldo >= 0 ? "pos" : "neg";

        tr.innerHTML = `
          <td class="num">${dt}</td>
          <td>${(desc||"").toString().toUpperCase()}</td>
          <td>${(obs||"").toString()}</td>
          <td class="num">${receitaTxt}</td>
          <td class="num">${despesaTxt}</td>
          <td class="num"><span class="${saldoClass}">${money(saldo)}</span></td>
          <td>
            <div class="actions">
              <button class="mini edit" data-id="${r.id || ""}">EDITAR</button>
              <button class="mini del"  data-id="${r.id || ""}">EXCLUIR</button>
            </div>
          </td>
        `;

        tbody.appendChild(tr);
      });
    }

    // (Hoje) EDITAR/EXCLUIR aqui só mostra aviso — pra não quebrar nada antes do jogo.
    // Se você quiser que eu deixe 100% funcional com formulário de edição, eu faço depois.
    tbody.addEventListener("click", (e)=>{
      const btn = e.target?.closest("button");
      if(!btn) return;
      const id = btn.getAttribute("data-id") || "";
      if(btn.classList.contains("edit")){
        alert("EDITAR (ID: "+id+"). Se você quiser, eu ativo o formulário de edição com segurança depois do jogo.");
      }
      if(btn.classList.contains("del")){
        alert("EXCLUIR (ID: "+id+"). Se você quiser, eu ativo exclusão com confirmação depois do jogo.");
      }
    });

    async function consultar(){
      try{
        setStatus("Carregando...");
        const ano = selAno.value;
        const mes = selMes.value;
        const rows = await fetchCaixa(ano, mes);
        const rows2 = calcSaldoRows(rows);
        render(rows2);
        setStatus(`OK. Registros: ${rows2.length} | Filtro: ${mes}/${ano}`);
      }catch(err){
        console.error(err);
        setStatus("ERRO ao carregar Caixa. Veja o Console.");
      }
    }

    btnConsultar.addEventListener("click", consultar);

    btnBaixarPDF.addEventListener("click", ()=>{
      alert("BAIXAR PDF: posso ligar depois do jogo (pra não mexer em nada crítico agora).");
    });

    btnLimpar.addEventListener("click", ()=>{
      tbody.innerHTML = "";
      setStatus("Limpo.");
    });

    // init
    (function init(){
      buildAnoMes();
      consultar();
    })();
  </script>
</body>
</html>
